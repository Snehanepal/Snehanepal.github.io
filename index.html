<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneha 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
}

/* Center box */
.container {
  margin-top: 100px;
}

/* Buttons */
button {
  padding: 12px 25px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

.yes {
  background: white;
  color: #ff4b6e;
}

.no {
  background: black;
  color: white;
  position: absolute;
}

/* Hidden */
.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div id="lockScreen" class="container">
  <h2>🔐 Enter Secret Code</h2>
  <input type="password" id="pass" placeholder="Enter password">
  <br><br>
  <button onclick="checkPass()">Unlock 💖</button>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent" class="container hidden">
  <h1>Hey Sneha ❤️</h1>
  <p>Will you be mine forever? 💍</p>

  <button class="yes" onclick="yesClick()">YES 💖</button>
  <button class="no" id="noBtn">NO 😜</button>

  <h2 id="result"></h2>
</div>

<script>
/* PASSWORD CHECK */
function checkPass() {
  let p = document.getElementById("pass").value;
  if(p === "sneha123") { // 👉 password change kar sakta hai
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").classList.remove("hidden");
  } else {
    alert("Wrong password 😜");
  }
}

/* YES CLICK */
function yesClick() {
  document.getElementById("result").innerHTML =
    "Yayyyy ❤️ Sneha said YES 💍🎉";
}

/* NO BUTTON RUN AWAY */
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});
</script>

</body>
</html>
