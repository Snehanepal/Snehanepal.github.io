<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sneha ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      text-align: center;
      background: linear-gradient(45deg, #ff6a88, #ff99ac);
      color: white;
      overflow: hidden;
    }

    h1 {
      margin-top: 100px;
      font-size: 3em;
      animation: glow 2s infinite alternate;
    }

    p {
      font-size: 1.5em;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      background: white;
      color: #ff4b5c;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }

    button:hover {
      background: #ff4b5c;
      color: white;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px white; }
      to { text-shadow: 0 0 20px yellow; }
    }

    .heart {
      position: absolute;
      color: white;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1>Hey Sneha ❤️</h1>
  <p>You are the most beautiful part of my life 💖</p>

  <button onclick="showMessage()">Click me 😊</button>

  <p id="msg"></p>

  <script>
    function showMessage() {
      document.getElementById("msg").innerHTML =
        "Sneha, I Love You ❤️ Forever & Always 😘";
    }

    // Floating hearts effect
    setInterval(() => {
      let heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (20 + Math.random() * 20) + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }, 300);
  </script>

</body>
</html>
