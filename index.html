<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  overflow-x: hidden;
}

/* Glass Card */
.container {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 40px;
  max-width: 400px;
  margin: 100px auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
  animation: fadeIn 1.5s ease;
}

h1 {
  font-size: 2.5em;
}

p {
  font-size: 1.2em;
  opacity: 0.9;
}

/* Button */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4b6e;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  background: #ff4b6e;
  color: white;
}

/* Hidden Message */
#hiddenMsg {
  margin-top: 20px;
  display: none;
  font-size: 1.3em;
}

/* Floating Hearts */
.heart {
  position: fixed;
  color: rgba(255,255,255,0.7);
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* Fade animation */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>Hey Sneha ❤️</h1>
  <p id="typing"></p>

  <button onclick="showLove()">Tap Here 💖</button>

  <div id="hiddenMsg">
    Sneha, I Love You ❤️ <br>
    Forever & Always 😘
  </div>
</div>

<script>
/* Typing Effect */
let text = "You are not just special... you are my happiness 💖";
let i = 0;

function typingEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typingEffect, 40);
  }
}
typingEffect();

/* Button Action */
function showLove() {
  document.getElementById("hiddenMsg").style.display = "block";
}

/* Floating Hearts */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 300);
</script>

</body>
</html>
